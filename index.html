<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORJA - Dashboard Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --forja-orange: #F15A24; /* Laranja da Logo */
            --forja-dark: #000000;
            --forja-gray: #1a1a1a;
        }

        body { background-color: var(--forja-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        /* Sidebar Oculta que expande no Hover */
        #sidebar {
            width: 70px;
            transition: width 0.3s ease;
            background-color: var(--forja-gray);
            border-right: 1px solid #333;
            overflow: hidden;
        }
        #sidebar:hover { width: 260px; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .nav-item:hover { background-color: var(--forja-orange); }
        .nav-item i { width: 30px; font-size: 1.2rem; }
        
        .card { background: var(--forja-gray); border-radius: 12px; border: 1px solid #333; }
        .orange-text { color: var(--forja-orange); }
        .btn-filter { background: var(--forja-orange); color: black; font-weight: bold; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--forja-orange); border-radius: 10px; }

        .active-tab { border-left: 4px solid var(--forja-orange); background: #252525; }
    </style>
</head>
<body class="flex h-screen">

    <nav id="sidebar" class="flex flex-col h-full z-50">
        <div class="p-4 mb-10 flex justify-center">
            <img src="img_logo.jpeg" alt="FORJA Logo" class="w-12 min-w-[48px]">
        </div>

        <div onclick="switchTab('controle')" class="nav-item active-tab" id="btn-controle">
            <i class="fas fa-helmet-safety"></i>
            <span class="ml-4 font-bold uppercase tracking-widest">Controle Produção</span>
        </div>

        <div onclick="switchTab('estoque')" class="nav-item" id="btn-estoque">
            <i class="fas fa-boxes-stacked"></i>
            <span class="ml-4 font-bold uppercase tracking-widest">Estoque / Lotes</span>
        </div>

        <div class="mt-auto p-6 text-xs text-gray-500">
            <span>FORJA v1.0</span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="p-6 bg-black flex flex-wrap items-center justify-between gap-4 border-b border-gray-800">
            <div>
                <h2 id="tab-title" class="text-2xl font-bold uppercase orange-text">Controle de Produção</h2>
                <p class="text-gray-400 text-sm">Integração Real-time Google Sheets</p>
            </div>

            <div class="flex gap-3">
                <select id="filterMonth" onchange="updateUI()" class="bg-zinc-900 border border-gray-700 p-2 rounded text-white outline-none">
                    <option value="all">Todos os Meses</option>
                </select>
                <select id="filterType" onchange="updateUI()" class="bg-zinc-900 border border-gray-700 p-2 rounded text-white outline-none">
                    <option value="all">Tipos (Tamanho)</option>
                </select>
            </div>
        </header>

        <section class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card p-6 flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm uppercase">Pedidos no Mês</p>
                        <h3 id="kpi-month-qty" class="text-4xl font-bold">0</h3>
                    </div>
                    <i class="fas fa-calendar-check orange-text text-3xl opacity-50"></i>
                </div>
                <div class="card p-6 flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm uppercase">Produzidos</p>
                        <h3 id="kpi-produced" class="text-4xl font-bold">0</h3>
                    </div>
                    <i class="fas fa-hammer orange-text text-3xl opacity-50"></i>
                </div>
                <div class="card p-6 flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm uppercase">Aguardando Envio</p>
                        <h3 id="kpi-waiting" class="text-4xl font-bold">0</h3>
                    </div>
                    <i class="fas fa-truck-fast orange-text text-3xl opacity-50"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="card p-6 lg:col-span-1">
                    <h4 class="mb-4 font-bold text-gray-300 italic">DEMANDA POR COR</h4>
                    <canvas id="chartDoughnut"></canvas>
                </div>

                <div class="card p-4 lg:col-span-2 overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400">
                                <th class="p-3">Data</th>
                                <th class="p-3">Pedido/Lote</th>
                                <th class="p-3">Tamanho</th>
                                <th class="p-3">Cor</th>
                                <th class="p-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURAÇÃO: INSIRA AQUI A URL DO SEU GOOGLE APPS SCRIPT
        const API_URL = "SUA_URL_DO_APPS_SCRIPT_AQUI";

        let fullData = {};
        let currentTab = 'controle';
        let myChart;

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                fullData = await response.json();
                setupFilters();
                updateUI();
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
                alert("Erro ao conectar com a Planilha. Verifique a URL da API.");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            document.getElementById('tab-title').innerText = tab === 'controle' ? 'Controle de Produção' : 'Estoque e Lotes';
            setupFilters();
            updateUI();
        }

        function setupFilters() {
            const data = fullData[currentTab];
            const filterMonth = document.getElementById('filterMonth');
            const filterType = document.getElementById('filterType');

            // Set Meses únicos
            const meses = [...new Set(data.map(i => {
                const d = new Date(i["Data de Pedido"]);
                return isNaN(d) ? null : `${d.getMonth() + 1}/${d.getFullYear()}`;
            }))].filter(Boolean);

            filterMonth.innerHTML = '<option value="all">Todos os Meses</option>' + 
                meses.map(m => `<option value="${m}">${m}</option>`).join('');

            // Set Tipos (Tamanho)
            const tipos = [...new Set(data.map(i => i["Tamanho"]))].filter(Boolean);
            filterType.innerHTML = '<option value="all">Todos os Tipos</option>' + 
                tipos.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function updateUI() {
            const monthVal = document.getElementById('filterMonth').value;
            const typeVal = document.getElementById('filterType').value;
            let data = fullData[currentTab];

            // Filtros Dinâmicos
            if (monthVal !== 'all') {
                data = data.filter(i => {
                    const d = new Date(i["Data de Pedido"]);
                    return `${d.getMonth() + 1}/${d.getFullYear()}` === monthVal;
                });
            }
            if (typeVal !== 'all') {
                data = data.filter(i => i["Tamanho"] === typeVal);
            }

            // Atualiza KPIs
            document.getElementById('kpi-month-qty').innerText = data.length;
            document.getElementById('kpi-produced').innerText = data.filter(i => i["Produção"] === "Sim").length;
            document.getElementById('kpi-waiting').innerText = data.filter(i => i["Status"] === "Aguardando" || i["Status"] === "Aguardando...").length;

            // Atualiza Tabela
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.slice(0, 15).map(i => `
                <tr class="border-b border-gray-800 hover:bg-zinc-900">
                    <td class="p-3">${i["Data de Pedido"] ? new Date(i["Data de Pedido"]).toLocaleDateString('pt-BR') : '-'}</td>
                    <td class="p-3 font-bold">${i["Cód do Pedido"] || i["Cód do Lote"]}</td>
                    <td class="p-3">${i["Tamanho"]}</td>
                    <td class="p-3"><span class="w-3 h-3 inline-block rounded-full mr-2" style="background:${translateColor(i["Cor"])}"></span>${i["Cor"]}</td>
                    <td class="p-3 font-bold text-xs ${i["Status"] === 'Enviado' ? 'text-green-500' : 'text-orange-400'}">${i["Status"]}</td>
                </tr>
            `).join('');

            updateChart(data);
        }

        function updateChart(data) {
            const ctx = document.getElementById('chartDoughnut').getContext('2d');
            const coresCount = data.reduce((acc, i) => {
                acc[i.Cor] = (acc[i.Cor] || 0) + 1;
                return acc;
            }, {});

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(coresCount),
                    datasets: [{
                        data: Object.values(coresCount),
                        backgroundColor: ['#F15A24', '#333', '#555', '#999', '#f39c12'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });
        }

        function translateColor(cor) {
            const map = { "Branco": "#fff", "Preto": "#000", "Azul": "#3498db", "Verde": "#2ecc71", "Vermelho": "#e74c3c" };
            return map[cor] || "#555";
        }

        // Início
        fetchData();
    </script>
</body>
</html>
