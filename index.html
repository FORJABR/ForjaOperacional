<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORJA - Dashboard Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --forja-orange: #F15A24;
            --forja-dark: #000000;
            --forja-gray: #1a1a1a;
        }

        body { background-color: var(--forja-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        /* Sidebar - Desktop Hover & Mobile Toggle */
        #sidebar {
            background-color: var(--forja-gray);
            border-right: 1px solid #333;
            transition: all 0.3s ease;
        }
        
        /* Desktop behavior */
        @media (min-width: 768px) {
            #sidebar { width: 70px; overflow: hidden; }
            #sidebar:hover { width: 260px; }
            .mobile-overlay { display: none !important; }
            #mobile-menu-btn { display: none; }
        }

        /* Mobile behavior */
        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                left: -260px;
                width: 260px;
                height: 100%;
                z-index: 50;
            }
            #sidebar.open { left: 0; }
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .nav-item:hover { background-color: var(--forja-orange); }
        .nav-item i { width: 30px; font-size: 1.2rem; }
        
        .card { background: var(--forja-gray); border-radius: 12px; border: 1px solid #333; }
        .orange-text { color: var(--forja-orange); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--forja-orange); border-radius: 10px; }

        .active-tab { border-left: 4px solid var(--forja-orange); background: #252525; }
        
        /* Overlay for mobile sidebar */
        .mobile-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40;
            display: none;
        }
        .mobile-overlay.open { display: block; }
    </style>
</head>
<body class="flex h-screen flex-col md:flex-row">

    <!-- Mobile Header -->
    <div class="md:hidden flex items-center justify-between p-4 border-b border-gray-800 bg-black z-30">
        <img src="img_logo.jpeg" alt="FORJA Logo" class="w-10">
        <button id="mobile-menu-btn" onclick="toggleMobileMenu()" class="text-white text-2xl focus:outline-none">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <!-- Sidebar -->
    <nav id="sidebar" class="flex flex-col h-full absolute md:relative">
        <div class="p-4 mb-6 md:mb-10 flex justify-between items-center md:justify-center">
            <img src="img_logo.jpeg" alt="FORJA Logo" class="w-12 min-w-[48px] hidden md:block">
            <h2 class="md:hidden font-bold tracking-widest text-xl ml-4">MENU</h2>
            <button class="md:hidden text-gray-400 text-xl mr-4" onclick="toggleMobileMenu()"><i class="fas fa-times"></i></button>
        </div>

        <div onclick="switchTab('controle')" class="nav-item active-tab" id="btn-controle">
            <i class="fas fa-helmet-safety"></i>
            <span class="ml-4 font-bold uppercase tracking-widest">Controle Produção</span>
        </div>

        <div onclick="switchTab('estoque')" class="nav-item" id="btn-estoque">
            <i class="fas fa-boxes-stacked"></i>
            <span class="ml-4 font-bold uppercase tracking-widest">Estoque / Lotes</span>
        </div>

        <div class="mt-auto p-6 text-xs text-gray-500">
            <span>FORJA v1.1</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto w-full">
        <header class="p-4 md:p-6 bg-black flex flex-col md:flex-row items-start md:items-center justify-between gap-4 border-b border-gray-800">
            <div>
                <h2 id="tab-title" class="text-xl md:text-2xl font-bold uppercase orange-text">Controle de Produção</h2>
                <p class="text-gray-400 text-xs md:text-sm">Integração Real-time Google Sheets</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <select id="filterMonth" onchange="updateUI()" class="bg-zinc-900 border border-gray-700 p-2 rounded text-white outline-none text-sm w-full sm:w-auto">
                    <option value="all">Carregando...</option>
                </select>
                <select id="filterType" onchange="updateUI()" class="bg-zinc-900 border border-gray-700 p-2 rounded text-white outline-none text-sm w-full sm:w-auto">
                    <option value="all">Carregando...</option>
                </select>
            </div>
        </header>

        <section class="p-4 md:p-6">
            <div id="loader" class="text-center py-10 orange-text font-bold animate-pulse">Sincronizando dados com as planilhas...</div>
            
            <div id="dashboard-content" class="hidden">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 mb-8">
                    <div class="card p-4 md:p-6 flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-xs md:text-sm uppercase">Total no Mês</p>
                            <h3 id="kpi-month-qty" class="text-3xl md:text-4xl font-bold">0</h3>
                        </div>
                        <i class="fas fa-calendar-check orange-text text-2xl md:text-3xl opacity-50"></i>
                    </div>
                    <div class="card p-4 md:p-6 flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-xs md:text-sm uppercase">Produzidos / Ok</p>
                            <h3 id="kpi-produced" class="text-3xl md:text-4xl font-bold">0</h3>
                        </div>
                        <i class="fas fa-hammer orange-text text-2xl md:text-3xl opacity-50"></i>
                    </div>
                    <div class="card p-4 md:p-6 flex items-center justify-between sm:col-span-2 lg:col-span-1">
                        <div>
                            <p class="text-gray-400 text-xs md:text-sm uppercase">Pendentes / Aguardando</p>
                            <h3 id="kpi-waiting" class="text-3xl md:text-4xl font-bold">0</h3>
                        </div>
                        <i class="fas fa-clock orange-text text-2xl md:text-3xl opacity-50"></i>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="card p-4 md:p-6 lg:col-span-1 flex flex-col justify-center items-center h-[300px] md:h-auto">
                        <h4 class="mb-2 font-bold text-gray-300 italic self-start w-full text-center md:text-left">DISTRIBUIÇÃO</h4>
                        <div class="relative w-full max-w-[250px] mx-auto">
                            <canvas id="chartDoughnut"></canvas>
                        </div>
                    </div>

                    <div class="card p-0 lg:col-span-2 overflow-hidden flex flex-col">
                        <div class="overflow-x-auto p-4">
                            <table class="w-full text-left text-xs md:text-sm min-w-[600px]">
                                <thead>
                                    <tr class="border-b border-gray-700 text-gray-400">
                                        <th class="p-3">Data</th>
                                        <th class="p-3">Referência</th>
                                        <th class="p-3">Tamanho</th>
                                        <th class="p-3">Cor</th>
                                        <th class="p-3">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURAÇÃO: INSIRA AS DUAS URLs AQUI
        const API_CONTROLE = "COLE_AQUI_A_URL_DA_PLANILHA_CONTROLE";
        const API_ESTOQUE = "COLE_AQUI_A_URL_DA_PLANILHA_ESTOQUE";

        let fullData = { controle: [], estoque: [] };
        let currentTab = 'controle';
        let myChart;

        function toggleMobileMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobile-overlay').classList.toggle('open');
        }

        async function fetchAllData() {
            try {
                // Melhoria de performance: Busca as duas APIs ao mesmo tempo
                const [resControle, resEstoque] = await Promise.all([
                    fetch(API_CONTROLE),
                    fetch(API_ESTOQUE)
                ]);

                fullData.controle = await resControle.json();
                fullData.estoque = await resEstoque.json();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                
                setupFilters();
                updateUI();
            } catch (e) {
                console.error("Erro de sincronização:", e);
                document.getElementById('loader').innerText = "Erro ao conectar com as planilhas. Verifique as URLs no código.";
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            document.getElementById('tab-title').innerText = tab === 'controle' ? 'Controle de Produção' : 'Estoque e Lotes';
            
            if(window.innerWidth < 768) toggleMobileMenu(); // Fecha o menu no celular ao clicar
            
            setupFilters();
            updateUI();
        }

        function setupFilters() {
            const data = fullData[currentTab];
            const filterMonth = document.getElementById('filterMonth');
            const filterType = document.getElementById('filterType');

            const dateKey = currentTab === 'controle' ? 'Data de Pedido' : 'Data de Pedido'; // Ajuste se o cabeçalho de data mudar no estoque

            const meses = [...new Set(data.map(i => {
                if(!i[dateKey]) return null;
                const d = new Date(i[dateKey]);
                return isNaN(d) ? null : `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
            }))].filter(Boolean).sort((a,b) => b.localeCompare(a)); // Ordena do mais recente

            filterMonth.innerHTML = '<option value="all">Todos os Meses</option>' + 
                meses.map(m => `<option value="${m}">${m}</option>`).join('');

            const tipos = [...new Set(data.map(i => i["Tamanho"]))].filter(Boolean);
            filterType.innerHTML = '<option value="all">Todos os Tipos</option>' + 
                tipos.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function updateUI() {
            const monthVal = document.getElementById('filterMonth').value;
            const typeVal = document.getElementById('filterType').value;
            let data = fullData[currentTab];
            
            const dateKey = currentTab === 'controle' ? 'Data de Pedido' : 'Data de Pedido';
            const refKey = currentTab === 'controle' ? 'Cód do Pedido' : 'Cód do Lote';

            if (monthVal !== 'all') {
                data = data.filter(i => {
                    if(!i[dateKey]) return false;
                    const d = new Date(i[dateKey]);
                    return `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}` === monthVal;
                });
            }
            if (typeVal !== 'all') {
                data = data.filter(i => i["Tamanho"] === typeVal);
            }

            document.getElementById('kpi-month-qty').innerText = data.length;
            document.getElementById('kpi-produced').innerText = data.filter(i => i["Produção"] === "Sim").length;
            
            // Flexibilização do status de pendência para suportar as duas planilhas
            const aguardando = data.filter(i => {
                const s = String(i["Status"]).toLowerCase();
                return s.includes("aguardando") || s.includes("pendente");
            }).length;
            document.getElementById('kpi-waiting').innerText = aguardando;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.slice(0, 20).map(i => `
                <tr class="border-b border-gray-800 hover:bg-zinc-900 transition-colors">
                    <td class="p-3 whitespace-nowrap">${i[dateKey] ? new Date(i[dateKey]).toLocaleDateString('pt-BR') : '-'}</td>
                    <td class="p-3 font-bold">${i[refKey] || '-'}</td>
                    <td class="p-3">${i["Tamanho"] || '-'}</td>
                    <td class="p-3 flex items-center whitespace-nowrap">
                        <span class="w-3 h-3 inline-block rounded-full border border-gray-600 mr-2" style="background:${translateColor(i["Cor"])}"></span>
                        ${i["Cor"] || '-'}
                    </td>
                    <td class="p-3 font-bold text-xs ${String(i["Status"]).includes('Enviado') ? 'text-green-500' : 'text-orange-400'}">${i["Status"] || '-'}</td>
                </tr>
            `).join('');

            updateChart(data);
        }

        function updateChart(data) {
            const ctx = document.getElementById('chartDoughnut').getContext('2d');
            const coresCount = data.reduce((acc, i) => {
                if(i.Cor) acc[i.Cor] = (acc[i.Cor] || 0) + 1;
                return acc;
            }, {});

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(coresCount),
                    datasets: [{
                        data: Object.values(coresCount),
                        backgroundColor: ['#F15A24', '#ffffff', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: '#ccc', padding: 15, font: { size: 11 } } } 
                    } 
                }
            });
        }

        function translateColor(cor) {
            if(!cor) return "transparent";
            const map = { "Branco": "#fff", "Preto": "#000", "Azul": "#3498db", "Verde": "#2ecc71", "Vermelho": "#e74c3c", "Rosa": "#ff9ff3", "Amarelo": "#f1c40f" };
            return map[cor] || "#555";
        }

        // Inicializa buscando ambas as APIs
        fetchAllData();
    </script>
</body>
</html>
